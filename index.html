<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>javaTetris</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      overflow: hidden;
    }
    canvas {
      touch-action: none;  /* prevent browser scroll/zoom on canvas touch */
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      z-index: 60;  /* above controls panel (z-index: 50) */
    }
  </style>
</head>
<body>
  <!-- Controls legend — fixed to right side, behind the canvas -->
  <div id="controls-panel" style="
    position: fixed;
    right: 12px;
    bottom: 44px;
    z-index: 50;
    text-align: right;
    font-family: Consolas, monospace;
    font-size: 10px;
    color: #555;
    line-height: 1.7;
    pointer-events: none;
  ">
    <div id="controls-keyboard">
      <div style="color:#888;margin-bottom:2px;">KEYBOARD</div>
      <div>Space — start / restart</div>
      <div>← → — move</div>
      <div>↑ — rotate CW</div>
      <div>↓ — soft drop</div>
      <div>Z — trip mode</div>
    </div>
    <div id="controls-mouse">
      <div style="color:#888;margin-bottom:2px;">MOUSE</div>
      <div>left click — rotate CW</div>
      <div>right click — rotate CCW</div>
      <div>hold — soft drop</div>
    </div>
    <div id="controls-touch">
      <div style="color:#888;margin-bottom:2px;">TOUCH</div>
      <div>tap — rotate</div>
      <div>tap strip ← → — move</div>
      <div>drag ← → — move</div>
      <div>drag ↓ / hold — soft drop</div>
    </div>
  </div>
  <script>
    (function() {
      var sections = {
        keyboard: document.getElementById('controls-keyboard'),
        mouse:    document.getElementById('controls-mouse'),
        touch:    document.getElementById('controls-touch')
      };

      function showOnly(type) {
        for (var key in sections) {
          sections[key].style.display = key === type ? '' : 'none';
        }
      }

      // Default: touch if device has touch points, otherwise keyboard
      showOnly(navigator.maxTouchPoints > 0 ? 'touch' : 'keyboard');

      document.addEventListener('keydown', function() { showOnly('keyboard'); });
      document.addEventListener('pointerdown', function(e) {
        if (e.pointerType === 'mouse') showOnly('mouse');
        else if (e.pointerType === 'touch') showOnly('touch');
      });
    })();
  </script>

  <!-- GitHub link and last commit date — fixed bottom-right, below controls -->
  <div style="position:fixed;bottom:24px;right:12px;z-index:50;">
    <a href="https://github.com/spotco/JavaTetrisHtml5Port" target="_blank"
       style="color:#444;font-size:10px;font-family:monospace;text-decoration:none;">
      github.com/spotco/JavaTetrisHtml5Port
    </a>
  </div>
  <div id="build-info" style="position:fixed;bottom:8px;right:12px;color:#444;font-size:10px;font-family:monospace;z-index:50;"></div>
  <script>
    fetch('https://api.github.com/repos/spotco/JavaTetrisHtml5Port/commits/HEAD')
      .then(r => r.json())
      .then(d => {
        var date = new Date(d.commit.committer.date);
        document.getElementById('build-info').textContent = 'last commit: ' + date.toLocaleString();
      })
      .catch(function() {});
  </script>
  <!-- Phaser 3 loaded globally from CDN — mirrors Java's import of javax.swing -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script type="module" src="src/TetrisMain.js"></script>
</body>
</html>
