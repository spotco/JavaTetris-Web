<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>javaTetris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      overflow: hidden; /* prevents scrollbar appearing when canvas is scaled */
    }
  </style>
</head>
<body>
  <!-- GitHub link and last commit date shown in bottom-right corner -->
  <div style="position:fixed;bottom:24px;right:12px;z-index:100;">
    <a href="https://github.com/spotco/JavaTetrisHtml5Port" target="_blank"
       style="color:#444;font-size:10px;font-family:monospace;text-decoration:none;">
      github.com/spotco/JavaTetrisHtml5Port
    </a>
  </div>
  <div id="build-info" style="position:fixed;bottom:8px;right:12px;color:#444;font-size:10px;font-family:monospace;z-index:100;"></div>
  <script>
    fetch('https://api.github.com/repos/spotco/JavaTetrisHtml5Port/commits/HEAD')
      .then(r => r.json())
      .then(d => {
        var date = new Date(d.commit.committer.date);
        document.getElementById('build-info').textContent = 'last commit: ' + date.toLocaleString();
      })
      .catch(function() {});
  </script>
  <!-- Phaser 3 loaded globally from CDN — mirrors Java's import of javax.swing -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script type="module" src="src/TetrisMain.js"></script>
</body>
</html>
